# Kaka Agent Configuration
# Copy this file to ~/.kaka-agent/config.yaml and customize

# Server configuration
host: "0.0.0.0"
port: 8000

# Feature flags
enable_web: true
enable_api: true
enable_dashboard: true

# Database configuration (optional)
# By default, SQLite is used at ~/.kaka-agent/data/agent_state.db
# Only configure this if you want to use PostgreSQL
# database:
#   url: "postgresql+asyncpg://user:password@localhost:5432/kaka_agent"

# Runtime/admin configuration is stored in the database and managed from the dashboard:
# - LLM providers, default model, provider API keys, models, and enabled state
# - MCP servers, including encrypted env.* and headers.*
# - Telegram/Discord/GitHub channel settings, including encrypted tokens and secrets
# - recursion_limit

# Security Configuration
security:
  # Secret key used for JWT token signing.
  # If left empty or missing, the app will auto-generate a secure random string on first run and save it point here.
  # IMPORTANT: Keep this secret safe in production.
  # You can generate one manually with: `openssl rand -hex 32` or `python -c "import secrets; print(secrets.token_hex(32))"`
  jwt_secret: ""

# Channel integrations are configured in the dashboard at Settings > Channels.
# Existing channel values in config.yaml are copied into the database once when
# the runtime database source is attached, but new edits should be made there.

# Security (optional)
# persistence:
#   allow_any_path: false  # Set to true to allow database outside ~/.kaka-agent/

# Workspace settings (optional)
# workspace:
#   root: "~/kaka-agent"

# Dashboard display settings (optional)
# Use an IANA timezone name such as "Asia/Bangkok".
display:
  timezone: "Asia/Ho_Chi_Minh"

