# Kai Agent Configuration
# Copy this file to ~/.k41-agent/config.yaml and customize

# Server configuration
host: "0.0.0.0"
port: 8000

# Feature flags
enable_web: true
enable_api: true
enable_dashboard: true

# Database configuration (optional)
# By default, SQLite is used at ~/.k41-agent/data/agent_state.db
# Only configure this if you want to use PostgreSQL
# database:
#   url: "postgresql+asyncpg://user:password@localhost:5432/k41_agent"

# Runtime/admin configuration is stored in the database and managed from the dashboard:
# - LLM providers, default model, provider API keys, models, and enabled state
# - MCP servers, including encrypted env.* and headers.*
# - Telegram/Discord/GitHub channel settings, including encrypted tokens and secrets
# - display.timezone (IANA timezone used to render dashboard timestamps)
# - recursion_limit

# Internal security configuration
security:
  # Internal JWT signing secret. Leave empty; the app auto-generates and saves it on first run.
  # This value is not exposed in the dashboard.
  jwt_secret: ""

  # CORS allowed origins (list of URLs or comma-separated string)
  # Default: ["http://localhost:8000", "http://127.0.0.1:8000"]
  # For production, specify your actual frontend domains
  # Example: ["https://app.example.com", "https://www.example.com"]
  cors_origins:
    - "http://localhost:8000"
    - "http://127.0.0.1:8000"

  # CSRF (Cross-Site Request Forgery) protection for cookie-based authentication
  # Default: true (enabled)
  # Note: Requests using Bearer token authentication automatically bypass CSRF checks
  csrf_protection_enabled: true

# Channel integrations are configured in the dashboard at Settings > Channels.
# Existing channel values in config.yaml are copied into the database once when
# the runtime database source is attached, but new edits should be made there.

# Security (optional)
# persistence:
#   allow_any_path: false  # Set to true to allow database outside ~/.k41-agent/

# Workspace settings (optional)
# workspace:
#   root: "~/k41-agent"
# Workspace backend credentials are configured in the dashboard at Settings > Backends.

# Dashboard display settings (e.g. IANA timezone) are runtime configuration
# stored in the database and managed from the dashboard at Settings > General.

