# Kaka Agent Configuration
# Copy this file to ~/.kaka-agent/config.yaml and customize

# Server configuration
host: "0.0.0.0"
port: 8000

# Feature flags
enable_web: true
enable_api: true
enable_dashboard: true

# Database configuration (optional)
# By default, SQLite is used at ~/.kaka-agent/data/agent_state.db
# Only configure this if you want to use PostgreSQL
# database:
#   url: "postgresql+asyncpg://user:password@localhost:5432/kaka_agent"

# LLM Provider configuration
llm:
  # Multi-provider mode
  default_provider: "primary"

  providers:
    primary:
      type: "openai_compatible"
      api_key: "your-primary-provider-api-key"
      base_url: "https://api.example.com/v1"
      default_model: ""
      models: []
      enabled: true

    secondary:
      type: "google"
      api_key: "your-secondary-provider-api-key"
      default_model: ""
      models: []
      enabled: true

  # Temperature for model responses (optional)
  # temperature: 0.0

# Security Configuration
security:
  # Secret key used for JWT token signing.
  # If left empty or missing, the app will auto-generate a secure random string on first run and save it point here.
  # IMPORTANT: Keep this secret safe in production.
  # You can generate one manually with: `openssl rand -hex 32` or `python -c "import secrets; print(secrets.token_hex(32))"`
  jwt_secret: ""

# Channel integrations (optional - uncomment to enable)
# channels:
#   telegram:
#     enabled: true
#     # Use "polling" for local/headless deployments, or "webhook" behind HTTPS.
#     update_mode: "polling"
#     # Telegram Bot Token from @BotFather
#     bot_token: "your-telegram-bot-token-here"
#     # Required only when update_mode is "webhook".
#     webhook_url: "https://your-domain.example/channels/telegram/webhook"
#     webhook_secret: "your-telegram-webhook-secret"
#
#   discord:
#     enabled: false
#     # Discord Bot Token from Discord Developer Portal
#     bot_token: "your-discord-bot-token-here"
#
#   github:
#     enabled: false
#     # GitHub App settings. client_secret is not needed for the single-admin V1 flow.
#     app_id: "your-github-app-id"
#     app_slug: "your-github-app-slug"
#     private_key_path: "~/.kaka-agent/github-app.pem"
#     # You may use private_key instead of private_key_path for a PEM string.
#     private_key: ""
#     webhook_secret: "your-github-webhook-secret"
#     default_agent: "default"
#     trigger_label: "kaka-agent"
#     mention_triggers:
#       - "@kaka-agent"
#       - "/kaka"

# Security (optional)
# persistence:
#   allow_any_path: false  # Set to true to allow database outside ~/.kaka-agent/

# Workspace settings (optional)
# workspace:
#   root: "~/kaka-agent"

# Dashboard display settings (optional)
# Use an IANA timezone name such as "Asia/Bangkok".
display:
  timezone: "Asia/Ho_Chi_Minh"

# Max recursion limit for LangGraph workflows (default: 100)
recursion_limit: 100


