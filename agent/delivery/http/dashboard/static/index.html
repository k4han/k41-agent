<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    (() => {
      try {
        const stored = window.localStorage.getItem("kaka-dashboard-theme");
        const mode = stored === "dark" || stored === "light" ? stored : null;
        const isDark =
          mode === "dark" ||
          (!mode &&
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.classList.toggle("dark", isDark);
      } catch (e) {
        // ignore
      }
    })();
  </script>
  <title>Kaka Dashboard</title>
  <script type="module" crossorigin src="/dashboard-assets/assets/index-CSetuNf8.js"></script>
  <link rel="stylesheet" crossorigin href="/dashboard-assets/assets/index-DxgOEduL.css">
</head>

<body>
  <div id="root"></div>
</body>

</html>
